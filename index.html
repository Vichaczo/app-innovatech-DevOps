<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovatech - Hardware & Gaming</title>
    <link rel="stylesheet" href="main.css">
</head>

<body>

    <header>
        <h1>Innovatech Store 🎮💻</h1>
        <p>Los artículos de hardware más vendidos</p>
    </header>

    <div class="productos-container" id="lista-productos">
        <p>Conectando con el servidor de Innovatech...</p>
    </div>

    <script>
        async function cargarProductos() {
            try {
                // IMPORTANTE: Cambia 'X.X.X.X' por la IP Elástica de tu EC2-App (Backend)
                // Usamos el puerto 8000 que es donde corre FastAPI
                const response = await fetch('http://10.0.2.101:8000/productos');

                if (!response.ok) {
                    throw new Error("Error en la respuesta del servidor");
                }

                const productos = await response.json();

                const contenedor = document.getElementById('lista-productos');
                contenedor.innerHTML = '';

                productos.forEach(prod => {
                    // Usamos prod.imagen_url porque así se llama en la base de datos
                    const card = `
                        <div class="producto-card">
                            <img src="${prod.imagen_url}" alt="${prod.nombre}">
                            <h3>${prod.nombre}</h3>
                            <p class="descripcion">${prod.descripcion}</p>
                            <p class="precio">$${prod.precio.toLocaleString('es-CL')}</p>
                            <p class="stock">Stock disponible: ${prod.stock} unid.</p>
                            <button>Añadir al Carro</button>
                        </div>
                    `;
                    contenedor.innerHTML += card;
                });

            } catch (error) {
                console.error("Error al conectar con la API:", error);
                document.getElementById('lista-productos').innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 20px;">
                        <p style="color: #ff5555; font-weight: bold;">⚠️ Error de conexión con el Backend</p>
                        <p style="font-size: 0.8em;">Verifica que el contenedor de la API esté corriendo y que el Security Group permita el puerto 8000.</p>
                    </div>`;
            }
        }

        // Llamamos a la función al cargar la página
        cargarProductos();
    </script>
</body>

</html>
